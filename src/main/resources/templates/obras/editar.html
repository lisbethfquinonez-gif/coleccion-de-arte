<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editar Obra</title>
    <link rel="stylesheet" href="/css//style.css">
</head>
<body>
<main class="contenedor-formulario">
    <div class="tarjeta-formulario">
<h1>Editar obra</h1>

<a href="/admin/obras">Volver al listado</a>

<form th:action="@{/admin/obras/actualizar/{id}(id=${obra.idObra})}" method="post" enctype="multipart/form-data">


    <label>Título:</label>
    <input type="text" name="titulo" th:value="${obra.titulo}" required>
    <br><br>

    <label>Autor:</label>
    <input type="text" name="autor" th:value="${obra.autor}" required>
    <br><br>

    <label>Año:</label>
    <input type="number" name="anio" th:value="${obra.anio}">
    <br><br>

    <label>Técnica:</label>
    <input type="text" name="tecnica" th:value="${obra.tecnica}">
    <br><br>

    <label>Dimensiones:</label>
    <input type="text" name="dimensiones" th:value="${obra.dimensiones}">
    <br><br>

    <label>Imagen actual:</label>
    <input type="text"
           name="imagenUrl"
           th:value="${obra.imagenUrl}"
           readonly>

    <br><br>

    <label>Nueva imagen:</label>
    <input type="file"
           name="imagen"
           accept="image/*">

    <label>Descripción:</label>
    <br>
    <textarea name="descripcion" rows="5" cols="40" th:text="${obra.descripcion}"></textarea>
    <br><br>

    <button type="submit">Actualizar obra</button>

</form>
    </div>
</main>
</body>
</html>
